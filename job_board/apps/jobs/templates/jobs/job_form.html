{% extends "jobs/layout.html" %}

{% block title %}Welcome | Job Board{% endblock title %}

{% block content %}
<div class="container">
  <h1>Job Form</h1>
  {% if messages %}
    <div class="error-message">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="form-control">
      {{ form }}
    </div>
    <button type="submit">Add Job</button>
  </form>
</div>
{% endblock content %}
