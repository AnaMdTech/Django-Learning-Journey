{% extends "base.html" %}
{% load static %}

{% block title %}All Jobs{% endblock %}

{% block css_files %}
  <link rel="stylesheet" href="{% static 'jobs/CSS/job_detail.css' %}">
{% endblock %}

{% block content %}
    <h2><a href="{% url "job-list" %}">Job Categories</a></h2>
    <div class="wrapper">
      <h3>{{ job.title }}</h3>
      <p>Salary: ${{ job.salary }}</p>
      <p>
        {{ job.description }}
      </p>
    </div>
{% endblock %}
