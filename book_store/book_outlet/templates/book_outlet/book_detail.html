{% extends "book_outlet/base.html" %}

{% block title %}
  {{ title }}
{% endblock %}

{% block content %}
  <h1>{{ book.title }}</h1>
  <h2>{{ book.author }}</h2>
  <p>The book has a rating of {{ book.rating }}

    {% if book.is_bestseller %}
      and is bestseller.
    {% else %} 
      but isn't a bestseller.
    {% endif %}
  </p>
{% endblock %}
